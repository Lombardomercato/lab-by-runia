<style>
:root {
    --bg: #050505;
    --bg-soft: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.12);
    --text: #f5f5f5;
    --muted: #a1a1a1;
    --line: rgba(255,255,255,0.08);
    --shadow: 0 24px 90px rgba(0,0,0,0.55);
    --radius-xl: 28px;
    --radius-lg: 22px;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 24%),
        var(--bg);
    color: var(--text);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    padding: 40px 20px;
}

.page {
    max-width: 960px;
    margin: 0 auto;
}

.proposal {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 36px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    box-shadow: var(--shadow);
}

.proposal::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 8% 10%, rgba(255,255,255,0.08), transparent 24%),
        radial-gradient(circle at 92% 18%, rgba(255,255,255,0.04), transparent 22%),
        radial-gradient(circle at 82% 88%, rgba(255,255,255,0.04), transparent 24%);
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    padding: 56px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 42px;
}

.brand-wrap {
    max-width: 620px;
}
